name: Build, Lint and Push Docker Image

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

      - name: Run Flake8
        run: |
          flake8 .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t saishrane/employee-portal:latest .
          docker tag saishrane/employee-portal:latest saishrane/employee-portal:${{ github.sha }}

      - name: Push Latest Image
        run: docker push saishrane/employee-portal:latest

      - name: Push Commit SHA Image
        run: docker push saishrane/employee-portal:${{ github.sha }}