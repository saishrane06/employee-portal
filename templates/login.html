{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="login-container">

    <h2>Login</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button class="btn-primary">
            Login
        </button>

    </form>

    {% if error %}
        <p style="color:red;text-align:center;">
            {{ error }}
        </p>
    {% endif %}

</div>

{% endblock %}
