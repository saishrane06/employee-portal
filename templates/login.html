<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button class="btn-primary">

Login

</button>

</form>

{% if error %}

<p style="color:red;text-align:center;">

{{ error }}

</p>

{% endif %}
